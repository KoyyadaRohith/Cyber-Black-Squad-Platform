<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register Workspace | Cyber Black Squad</title>
  <!-- FontAwesome & Google Fonts -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/styles.css">
  <!-- Supabase client and Core Auth & Data Scripts -->
  <script src="js/config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js/dist/umd/supabase.min.js"></script>
  <script src="js/db.js?v=1.1.2"></script>
  <script src="js/auth.js?v=1.1.2"></script>
</head>
<body class="auth-body">
  <script>
    (function() {
      const pref = localStorage.getItem('cbs_theme_preference');
      if (pref === 'dark') {
        document.body.classList.add('dark-theme');
      } else if (pref === 'auto') {
        const hour = new Date().getHours();
        if (hour < 6 || hour > 18) {
          document.body.classList.add('dark-theme');
        }
      }
    })();
  </script>

  <div class="auth-container" style="max-width: 480px; gap: 24px;">
    <!-- Header Branding -->
    <div class="auth-logo-row">
      <div class="metric-icon-box" style="width: 42px; height: 42px; border-radius: var(--radius-sm);">
        <i class="fa-solid fa-shield-halved"></i>
      </div>
      <h1 class="auth-logo">Cyber Black Squad</h1>
    </div>

    <div class="auth-header">
      <h2>Create Workspace Account</h2>
      <p>Join the team and collaborate within a zero-trust sandbox</p>
    </div>

    <!-- Alerts Container -->
    <div id="authAlert" class="auth-alert"></div>

    <!-- Registration Form -->
    <form id="registerForm" class="auth-form" onsubmit="handleRegister(event)">
      <div class="form-group">
        <label for="fullName"><i class="fa-regular fa-user" style="margin-right: 6px;"></i>Full Name</label>
        <input type="text" id="fullName" placeholder="full name" required autocomplete="name">
      </div>

      <div class="form-group">
        <label for="email"><i class="fa-regular fa-envelope" style="margin-right: 6px;"></i>Email Address</label>
        <input type="email" id="email" placeholder="name@cyberblacksquad.com" required autocomplete="email">
      </div>

<div class="form-grid" style="display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:0; width:100%;">
  
  <div class="form-group">
    <label for="password">
      <i class="fa-solid fa-lock" style="margin-right:6px;"></i>Password
    </label>
    <input
      type="password"
      id="password"
      placeholder="Min. 6 chars"
      required
      autocomplete="new-password"
      style="width:100%; box-sizing:border-box;"
    >
  </div>

  <div class="form-group">
    <label for="confirmPassword">
      <i class="fa-solid fa-check-double" style="margin-right:6px;"></i>Confirm
    </label>
    <input
      type="password"
      id="confirmPassword"
      placeholder="Repeat password"
      required
      autocomplete="new-password"
      style="width:100%; box-sizing:border-box;"
    >
  </div>

</div>

      <button type="submit" class="btn-primary" style="justify-content: center; width: 100%; padding: 12px; margin-top: 8px;">
        Create Account <i class="fa-solid fa-user-plus"></i>
      </button>
    </form>

    <div class="auth-divider" style="display: flex; align-items: center; margin: 12px 0; color: var(--text-light); font-size: 11px; font-weight: 600; text-transform: uppercase;">
      <span style="flex: 1; height: 1px; background: var(--border-color); margin-right: 12px;"></span>
      or
      <span style="flex: 1; height: 1px; background: var(--border-color); margin-left: 12px;"></span>
    </div>

    <button type="button" onclick="handleGoogleSignIn()" class="btn-secondary" style="width: 100%; display: flex; align-items: center; justify-content: center; gap: 10px; padding: 11px; font-weight: 600; border: 1px solid var(--border-color); background: #ffffff; color: var(--text-main); transition: 0.2s; border-radius: var(--radius-sm); cursor: pointer;" onmouseover="this.style.borderColor='var(--text-medium)'" onmouseout="this.style.borderColor='var(--border-color)'">
      <svg width="18" height="18" viewBox="0 0 18 18" style="margin-right: 2px;">
        <path fill="#4285F4" d="M17.64 9.2c0-.63-.06-1.25-.16-1.84H9v3.47h4.84a4.14 4.14 0 0 1-1.8 2.71v2.26h2.91c1.7-1.56 2.69-3.86 2.69-6.6z"/>
        <path fill="#34A853" d="M9 18c2.43 0 4.47-.8 5.96-2.2l-2.91-2.26c-.8.54-1.83.86-3.05.86-2.34 0-4.33-1.57-5.03-3.69H.95v2.3A9 9 0 0 0 9 18z"/>
        <path fill="#FBBC05" d="M3.97 10.71A5.4 5.4 0 0 1 3.6 9c0-.6.1-1.17.27-1.71v-2.3H.95A9 9 0 0 0 0 9c0 1.62.43 3.14 1.18 4.47l2.79-1.76z"/>
        <path fill="#EA4335" d="M9 3.58c1.32 0 2.5.45 3.44 1.35L15 2.3A9 9 0 0 0 .95 5v2.3c.7-2.12 2.69-3.72 5.03-3.72z"/>
      </svg>
      Sign up with Google
    </button>

    <div class="auth-footer">
      Already have a workspace account? <a href="login.html" style="font-weight: 600;">Sign in here</a>
    </div>
  </div>

  <script>
    // GUARD: Ensure proper initialization before checking auth
    document.addEventListener('DOMContentLoaded', async () => {
      if (window.cbsDB?.init) {
        await window.cbsDB.init();
      }

      if (window.cbsAuth && window.cbsAuth.isAuthenticated()) {
        // Already logged in - redirect to dashboard
        window.location.href = 'dashboard.html';
      }
    });

    async function handleRegister(e) {
      e.preventDefault();
      const fullName = document.getElementById('fullName').value.trim();
      const email = document.getElementById('email').value.trim();
      const alertDiv = document.getElementById('authAlert');

      if (!email.trim().toLowerCase().endsWith('@cyberblacksquad.com')) {
        alertDiv.className = 'auth-alert danger';
        alertDiv.innerHTML =
          '<i class="fa-solid fa-circle-exclamation" style="margin-right: 6px;"></i> Please use a Cyber Black Squad email address.';
        return;
      }

      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;

      // Validation checks
      if (password.length < 6) {
        alertDiv.className = 'auth-alert danger';
        alertDiv.innerHTML = '<i class="fa-solid fa-circle-exclamation" style="margin-right: 6px;"></i> Password must be at least 6 characters long.';
        return;
      }

      if (password !== confirmPassword) {
        alertDiv.className = 'auth-alert danger';
        alertDiv.innerHTML = '<i class="fa-solid fa-circle-exclamation" style="margin-right: 6px;"></i> Passwords do not match. Please verify.';
        return;
      }

      try {
        // Enforce default Intern role on manual sign ups
        await window.cbsAuth.register(fullName, email, password, 'Intern');

        alertDiv.className = 'auth-alert success';
        alertDiv.innerHTML = '<i class="fa-solid fa-circle-check" style="margin-right: 6px;"></i> Account created successfully! Redirecting to login...';

        // Redirect after delay
        setTimeout(() => {
          window.location.href = 'login.html?v=' + Date.now();
        }, 1800);
      } catch (err) {
        alertDiv.className = 'auth-alert danger';
        alertDiv.innerHTML = `<i class="fa-solid fa-triangle-exclamation" style="margin-right: 6px;"></i> ${err.message}`;
      }
    }

    // Google Sign-In / Sign-Up Simulated Overlay
    function handleGoogleSignIn() {
      let modal = document.getElementById('googleAuthModal');
      if (!modal) {
        modal = document.createElement('div');
        modal.id = 'googleAuthModal';
        modal.style = 'position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); display:flex; align-items:center; justify-content:center; z-index:999999; animation:fadeIn 0.2s ease-out;';
        document.body.appendChild(modal);
      }

      modal.innerHTML = `
        <div style="background:#ffffff; width:100%; max-width:400px; border-radius:8px; box-shadow:0 4px 24px rgba(0,0,0,0.15); font-family:'Roboto','Inter',sans-serif; padding:36px 40px; box-sizing:border-box; display:flex; flex-direction:column; align-items:center; position:relative;">
          <!-- Google Logo -->
          <svg width="40" height="40" viewBox="0 0 24 24" style="margin-bottom:16px;">
            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
            <path fill="#FBBC05" d="M5.84 14.09A6.76 6.76 0 0 1 5.4 12c0-.73.12-1.44.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22-.19-.62z"/>
            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
          </svg>

          <h3 style="font-size:22px; font-weight:500; color:#202124; margin:0 0 8px 0; text-align:center;">Choose an account</h3>
          <p style="font-size:14px; color:#5f6368; margin:0 0 24px 0; text-align:center;">to continue to Cyber Black Squad</p>

          <!-- Account List -->
          <div style="width:100%; display:flex; flex-direction:column; gap:1px; background:#dadce0; border-radius:4px; overflow:hidden; border:1px solid #dadce0;">
            <!-- Account 1 -->
            <div onclick="selectGoogleAccount('rohithkoyyada@cyberblacksquad.com', 'rocky@444')" style="background:#ffffff; padding:12px 16px; display:flex; align-items:center; gap:12px; cursor:pointer; transition:background 0.15s;" onmouseover="this.style.background='#f7f8f8'" onmouseout="this.style.background='#ffffff'">
              <div style="width:32px; height:32px; border-radius:50%; background:#e8f0fe; color:#1a73e8; display:flex; align-items:center; justify-content:center; font-weight:bold; font-size:14px;">KR</div>
              <div style="display:flex; flex-direction:column; text-align:left;">
                <span style="font-size:14px; font-weight:500; color:#3c4043;">Koyyada Rohith</span>
                <span style="font-size:12px; color:#5f6368;">rohithkoyyada@cyberblacksquad.com</span>
              </div>
            </div>

            <!-- Account 2 -->
            <div onclick="selectGoogleAccount('mrevilmonster@cyberblacksquad.com', 'mrevil@43')" style="background:#ffffff; padding:12px 16px; display:flex; align-items:center; gap:12px; cursor:pointer; transition:background 0.15s; border-top:1px solid #dadce0;" onmouseover="this.style.background='#f7f8f8'" onmouseout="this.style.background='#ffffff'">
              <div style="width:32px; height:32px; border-radius:50%; background:#fce8e6; color:#d93025; display:flex; align-items:center; justify-content:center; font-weight:bold; font-size:14px;">EM</div>
              <div style="display:flex; flex-direction:column; text-align:left;">
                <span style="font-size:14px; font-weight:500; color:#3c4043;">Mr Evil Monster</span>
                <span style="font-size:12px; color:#5f6368;">mrevilmonster@cyberblacksquad.com</span>
              </div>
            </div>

            <!-- Use another account -->
            <div onclick="selectGoogleOther()" style="background:#ffffff; padding:12px 16px; display:flex; align-items:center; gap:12px; cursor:pointer; transition:background 0.15s; border-top:1px solid #dadce0;" onmouseover="this.style.background='#f7f8f8'" onmouseout="this.style.background='#ffffff'">
              <div style="width:32px; height:32px; border-radius:50%; background:#f1f3f4; color:#5f6368; display:flex; align-items:center; justify-content:center;">
                <i class="fa-regular fa-user" style="font-size:14px;"></i>
              </div>
              <div style="text-align:left;">
                <span style="font-size:14px; font-weight:500; color:#1a73e8;">Use another account</span>
              </div>
            </div>
          </div>

          <div style="width:100%; display:flex; justify-content:space-between; margin-top:32px; font-size:12px; color:#5f6368;">
            <span style="cursor:pointer;" onmouseover="this.style.color='#202124'" onmouseout="this.style.color:#5f6368'">English (United States)</span>
            <div style="display:flex; gap:16px;">
              <span style="cursor:pointer;" onmouseover="this.style.color='#202124'" onmouseout="this.style.color:#5f6368'" onclick="document.getElementById('googleAuthModal').remove()">Cancel</span>
              <span style="cursor:pointer;" onmouseover="this.style.color='#202124'" onmouseout="this.style.color='#5f6368'">Privacy</span>
              <span style="cursor:pointer;" onmouseover="this.style.color='#202124'" onmouseout="this.style.color='#5f6368'">Terms</span>
            </div>
          </div>
        </div>
      `;
    }

    function selectGoogleAccount(email, pwd) {
      const alertDiv = document.getElementById('authAlert');
      document.getElementById('googleAuthModal').remove();
      
      // Auto register or login
      alertDiv.className = 'auth-alert success';
      alertDiv.innerHTML = '<i class="fa-solid fa-circle-check" style="margin-right: 6px;"></i> Google Account Authorized! Logging in...';
      
      setTimeout(async () => {
        try {
          await window.cbsAuth.login(email, pwd);
          window.location.href = 'dashboard.html';
        } catch (err) {
          window.location.href = 'login.html';
        }
      }, 1000);
    }

    function selectGoogleOther() {
      const modalBox = document.querySelector('#googleAuthModal > div');
      if (!modalBox) return;

      modalBox.innerHTML = `
        <svg width="40" height="40" viewBox="0 0 24 24" style="margin-bottom: 16px;">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09A6.76 6.76 0 0 1 5.4 12c0-.73.12-1.44.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22-.19-.62z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>

        <h3 style="font-size:22px; font-weight:500; color:#202124; margin:0 0 8px 0; text-align:center;">Google Sign-Up</h3>
        <p style="font-size:14px; color:#5f6368; margin:0 0 24px 0; text-align:center;">Create a zero-trust account with Google</p>

        <form onsubmit="handleGoogleRegisterSubmit(event)" style="width:100%; display:flex; flex-direction:column; gap:16px;">
          <div style="display:flex; flex-direction:column; text-align:left; gap:4px;">
            <label style="font-size:12px; font-weight:600; color:#3c4043;">Full Display Name</label>
            <input type="text" id="gRegName" placeholder="e.g. John Doe" required style="width:100%; padding:10px 12px; border:1px solid #dadce0; border-radius:4px; font-size:14px; box-sizing:border-box;">
          </div>
          <div style="display:flex; flex-direction:column; text-align:left; gap:4px;">
            <label style="font-size:12px; font-weight:600; color:#3c4043;">Google Email Address</label>
            <input type="email" id="gRegEmail" placeholder="username@gmail.com" required style="width:100%; padding:10px 12px; border:1px solid #dadce0; border-radius:4px; font-size:14px; box-sizing:border-box;">
          </div>
          <div style="display:flex; flex-direction:column; text-align:left; gap:4px;">
            <label style="font-size:12px; font-weight:600; color:#3c4043;">Set Account Password</label>
            <input type="password" id="gRegPass" placeholder="Min. 6 characters" required style="width:100%; padding:10px 12px; border:1px solid #dadce0; border-radius:4px; font-size:14px; box-sizing:border-box;">
          </div>

          <div style="display:flex; justify-content:space-between; align-items:center; margin-top:12px;">
            <span onclick="handleGoogleSignIn()" style="font-size:14px; color:#1a73e8; font-weight:600; cursor:pointer;">Back</span>
            <button type="submit" style="background:#1a73e8; color:#ffffff; border:none; padding:10px 24px; font-size:14px; font-weight:600; border-radius:4px; cursor:pointer; transition:background 0.15s;" onmouseover="this.style.background='#1557b0'" onmouseout="this.style.background='#1a73e8'">Next</button>
          </div>
        </form>
      `;
    }

    async function handleGoogleRegisterSubmit(e) {
      e.preventDefault();
      const name = document.getElementById('gRegName').value.trim();
      const email = document.getElementById('gRegEmail').value.trim();
      const pwd = document.getElementById('gRegPass').value;
      const alertDiv = document.getElementById('authAlert');

      document.getElementById('googleAuthModal').remove();

      if (pwd.length < 6) {
        alertDiv.className = 'auth-alert danger';
        alertDiv.innerHTML = '<i class="fa-solid fa-circle-exclamation" style="margin-right: 6px;"></i> Password must be at least 6 characters.';
        return;
      }

      try {
        // Enforce default Intern role
        await window.cbsAuth.register(name, email, pwd, 'Intern');
        await window.cbsAuth.login(email, pwd);

        alertDiv.className = 'auth-alert success';
        alertDiv.innerHTML = '<i class="fa-solid fa-circle-check" style="margin-right: 6px;"></i> Successfully registered and signed in via Google!';

        setTimeout(() => {
          window.location.href = 'dashboard.html';
        }, 1200);
      } catch (err) {
        alertDiv.className = 'auth-alert danger';
        alertDiv.innerHTML = `<i class="fa-solid fa-triangle-exclamation" style="margin-right: 6px;"></i> ${err.message}`;
      }
    }
  </script>
</body>
</html>
